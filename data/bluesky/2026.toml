created_at = '2026-02-15T15:59:49.232Z'
text = '''Until the tools offer the models a way to do these sorts of refactorings the same way I would—with a lot of mechanical cut and pasting—I feel like I'm better off doing those bits myself and then setting the model loose on "update all the broken imports" afterwards.'''

[posts.in_reply_to]
