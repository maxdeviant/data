created_at = '2026-02-12T18:10:35.096Z'
text = '''
And then we attach context at various points using some extension trait methods on `Span`:

```
tracing::Span::current().record_response_status(response.status.as_u16());
            tracing::Span::current().record_response_duration(env.clock().now() - started_at);
```'''

[posts.in_reply_to]
uri = 'at://did:plc:i4mpbrvmprmuyqwum2odtfhz/app.bsky.feed.post/3meolnvli5s22'
author_did = 'did:plc:i4mpbrvmprmuyqwum2odtfhz'
author_handle = 'maxdeviant.com'

[[posts]]
uri = 'at://did:plc:i4mpbrvmprmuyqwum2odtfhz/app.bsky.feed.post/3meolnvli5s22'
created_at = '2026-02-12T18:10:35.095Z'
text = '''
We're creating the wide event span when we start the request:

```
let span = tracing::info_span!("http_request",
    request.method = %req.method,
    request.path = req.url.path(),
    // ...
);
```

and then call `.instrument(span)` when calling into the routing layer.'''

