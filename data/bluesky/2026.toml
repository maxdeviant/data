text = '''
And we end up with something like this:

```
{
  "request": {
    "method": "POST",
    "path": "/client/llm_tokens"
  },
  "response": {
    "duration_ms": 979,
    "status": 500
  },
  "level": "log",
  "sample_rate": 1,
  "span_name": "http_request",
  "timestamp": 1770919514756
}
```'''

[posts.in_reply_to]
uri = 'at://did:plc:i4mpbrvmprmuyqwum2odtfhz/app.bsky.feed.post/3meolnvli5t22'
author_did = 'did:plc:i4mpbrvmprmuyqwum2odtfhz'
author_handle = 'maxdeviant.com'

[[posts]]
